services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      API_BASE_URL: ${API_BASE_URL}
      FCM_SENDER_ID: ${FCM_SENDER_ID}
      DEEP_LINK_SCHEME: ${DEEP_LINK_SCHEME}
      REGION_WS_URLS: ${REGION_WS_URLS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      REDIS_URL: redis://redis:6379/0
      APP_ENV: production
    expose:
      - "8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=2)"]
      interval: 20s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      replicas: 2

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
