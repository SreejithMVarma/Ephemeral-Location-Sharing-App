services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      API_BASE_URL: ${API_BASE_URL}
      FCM_SENDER_ID: ${FCM_SENDER_ID}
      DEEP_LINK_SCHEME: ${DEEP_LINK_SCHEME}
      REGION_WS_URLS: ${REGION_WS_URLS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      REDIS_URL: redis://redis:6379/0
      APP_ENV: staging
    ports:
      - "8000:8000"
    depends_on:
      - redis

  redis:
    image: redis:7-alpine

  prometheus:
    image: prom/prometheus:v2.55.1
    ports:
      - "9090:9090"
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3000:3000"
    volumes:
      - ./infra/observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
