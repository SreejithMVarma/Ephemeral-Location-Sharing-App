name: stale

on:
  schedule:
    - cron: '0 2 * * *'

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: "This issue is stale and will be closed if there is no activity."
          stale-pr-message: "This PR is stale and will be closed if there is no activity."
          days-before-stale: 21
          days-before-close: 7
