name: backend-ci

on:
  pull_request:
    branches: [main, staging]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('apps/backend/pyproject.toml') }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install fastapi uvicorn pydantic pydantic-settings redis pytest pytest-cov ruff mypy
      - name: Ruff
        run: ruff check src
      - name: MyPy strict
        run: mypy --strict src
      - name: Pytest coverage
        run: pytest --cov=src --cov-fail-under=80
