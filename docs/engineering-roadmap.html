let activePhase = 0;

function renderNav() {
  const nav = document.getElementById('phaseNav');
  nav.innerHTML = phases.map((p, i) => 
    `<button class="phase-btn ${i === activePhase ? 'active' : ''}" onclick="setPhase(${i})">${p.label}</button>`
  ).join('');
}

function setPhase(i) {
  activePhase = i;
  renderNav();
  renderSteps();
}

function renderSteps() {
  const container = document.getElementById('stepsContainer');
  const phase = phases[activePhase];
  
  container.innerHTML = `
    <div class="phase-header">
      <span class="phase-badge">PHASE ${String(activePhase + 1).padStart(2, '0')}</span>
      <span class="phase-title">${phase.title}</span>
    </div>
    ${phase.steps.map((s, idx) => renderStep(s, idx)).join('')}
  `;
}

function renderStep(s, idx) {
  const secTag = s.security && s.security.length ? `<span class="tag sec">SEC</span>` : '';
  const perfTag = s.tags.includes('perf') ? `<span class="tag perf">PERF</span>` : '';
  const testTag = s.tags.includes('test') ? `<span class="tag test">TEST</span>` : '';
  
  const tasksList = s.tasks.map(t => `<li>${t}</li>`).join('');
  const secList = s.security && s.security.length ? s.security.map(t => `<li>${t}</li>`).join('') : '';
  const perfList = s.perf && s.perf.length ? s.perf.map(t => `<li>${t}</li>`).join('') : '';
  
  const dodItems = s.dod ? s.dod.map(d => `
    <div class="dod-item"><span class="dod-check">✓</span><span>${d}</span></div>
  `).join('') : '';

  return `
    <div class="step-card" id="step-${s.num}">
      <div class="step-header" onclick="toggleStep('step-${s.num}')">
        <span class="step-num">STEP ${s.num}</span>
        <div class="step-title-block">
          <div class="step-name">${s.name}</div>
          <div class="step-obj">${s.obj}</div>
        </div>
        <div class="step-tags">${secTag}${perfTag}${testTag}</div>
        <svg class="chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M4 6l4 4 4-4"/>
        </svg>
      </div>
      <div class="step-body">
        <div class="section-label">Engineering Tasks</div>
        <ul class="task-list">${tasksList}</ul>
        
        ${secList ? `<div class="section-label">Security Considerations</div><ul class="task-list">${secList}</ul>` : ''}
        ${perfList ? `<div class="section-label">Performance Considerations</div><ul class="task-list">${perfList}</ul>` : ''}
        
        ${s.run ? `<div class="section-label">How to Run</div><div class="code-block">${s.run}</div>` : ''}
        ${s.debug ? `<div class="section-label">Debug Notes</div><div class="code-block">${s.debug}</div>` : ''}
        
        ${dodItems ? `<div class="section-label">Definition of Done</div><div class="dod-block">${dodItems}</div>` : ''}
        
        ${s.commit ? `<div class="section-label">Git Commit</div><div class="commit-block">${s.commit}</div>` : ''}
      </div>
    </div>
  `;
}

function toggleStep(id) {
  const card = document.getElementById(id);
  card.classList.toggle('open');
}

renderNav();
