*{box-sizing:border-box;margin:0;padding:0}

.wrap{font-family:'Space Grotesk',sans-serif;color:var(--color-text-primary);padding:1.5rem 0}

.hero{text-align:center;padding:2rem 1rem 1.5rem;border-bottom:0.5px solid var(--color-border-tertiary)}

.hero-sub{font-size:13px;color:var(--color-text-secondary);max-width:480px;margin:0 auto}

.palette-row{display:flex;gap:6px;padding:1rem 1rem 0;flex-wrap:wrap;align-items:center}
.swatch{width:28px;height:28px;border-radius:6px;flex-shrink:0}
.palette-label{font-family:'Space Mono',monospace;font-size:10px;color:var(--color-text-tertiary);letter-spacing:0.05em}

.phase-strip{display:flex;gap:6px;padding:1rem;overflow-x:auto;scrollbar-width:none;border-bottom:0.5px solid var(--color-border-tertiary)}
.phase-strip::-webkit-scrollbar{display:none}
.ph-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:transparent;font-size:11px;font-family:'Space Mono',monospace;color:var(--color-text-secondary);cursor:pointer;transition:all 0.18s;white-space:nowrap}
.ph-btn:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.ph-btn.on{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}

.content{padding:1.5rem 1rem 2rem}

.phase-block{display:none}
.phase-block.on{display:block}

.ph-title-row{display:flex;align-items:baseline;gap:10px;margin-bottom:1.5rem}
.ph-num{font-family:'Space Mono',monospace;font-size:10px;color:var(--color-text-tertiary);letter-spacing:0.1em}
.ph-title{font-size:20px;font-weight:700}

.screens-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1.5rem;margin-bottom:2rem}

.screen-wrap{display:flex;flex-direction:column;align-items:center;gap:12px}
.screen-label{font-size:12px;font-weight:600;color:var(--color-text-primary);text-align:center}
.screen-sub{font-size:11px;color:var(--color-text-tertiary);text-align:center;margin-top:-6px;font-family:'Space Mono',monospace}

.phone{width:190px;height:340px;border-radius:28px;background:#0a0a0f;border:2px solid #1a1a2e;position:relative;overflow:hidden;flex-shrink:0}
.phone::before{content:'';position:absolute;top:10px;left:50%;transform:translateX(-50%);width:40px;height:4px;background:#1a1a2e;border-radius:2px;z-index:10}
.phone-inner{position:absolute;inset:0;border-radius:26px;overflow:hidden}

.changes-list{margin-bottom:2rem}
.change-item{display:flex;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--color-border-tertiary);align-items:flex-start}
.change-item:last-child{border-bottom:none}
.ch-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:6px}
.ch-dot.critical{background:#ff3b5c}
.ch-dot.major{background:#00d4ff}
.ch-dot.polish{background:#a855f7}
.ch-body{flex:1}
.ch-tag{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.08em;color:var(--color-text-tertiary);margin-bottom:3px}
.ch-name{font-size:13px;font-weight:600;color:var(--color-text-primary);margin-bottom:2px}
.ch-desc{font-size:12px;color:var(--color-text-secondary);line-height:1.5}

.legend{display:flex;gap:16px;padding:0 0 1rem;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--color-text-secondary)}
.leg-dot{width:8px;height:8px;border-radius:50%}

.flutter-block{background:var(--color-background-secondary);border-radius:12px;padding:1rem;margin-bottom:1.5rem}
.flutter-title{font-size:12px;font-weight:600;margin-bottom:10px;color:var(--color-text-primary)}
.code-snippet{font-family:'Space Mono',monospace;font-size:10px;color:var(--color-text-secondary);line-height:1.7;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:8px;padding:10px;margin-top:8px;white-space:pre}

.anim-note{font-size:11px;font-family:'Space Mono',monospace;color:var(--color-text-tertiary);text-align:center;margin-top:6px}

@keyframes radarSweep{to{transform:rotate(360deg)}}
@keyframes blipPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.6;transform:scale(1.3)}}
@keyframes compassSpin{0%{transform:rotate(-20deg)}50%{transform:rotate(20deg)}100%{transform:rotate(-20deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes chatSlide{from{transform:translateX(100%)}to{transform:translateX(20%)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,255,136,0)}50%{box-shadow:0 0 12px 2px rgba(0,255,136,0.3)}}
@keyframes scanLine{0%{top:20px}100%{top:300px}}

function mk(tag,styles={},text=''){

function phone(contentFn, w=190, h=340){
  const wrap = document.createElement('div');
  wrap.className='phone';
  wrap.style.width=w+'px';
  wrap.style.height=h+'px';
  const inner=document.createElement('div');
  inner.className='phone-inner';
  contentFn(inner);
  wrap.appendChild(inner);
  return wrap;
}

let active=0;

function renderNav(){
  const strip=document.getElementById('phStrip');
  strip.innerHTML=phases.map((p,i)=>`<button class="ph-btn ${i===active?'on':''}" onclick="setPhase(${i})">${p.label}</button>`).join('');
}

function setPhase(i){
  active=i;
  renderNav();
  const c=document.getElementById('phContent');
  renderers[phases[i].id](c);
}
